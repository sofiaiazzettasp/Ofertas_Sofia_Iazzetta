let selected = 0;
let lang = 'es';
let tab = 'offer';

function setLang(l) {
  lang = l;
  document.getElementById('btn-es').classList.toggle('active', l==='es');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  render();
}

function setSelected(i) { selected = i; tab = 'offer'; render(); }
function setTab(t) { tab = t; render(); }

function copy(text, btnId) {
  navigator.clipboard.writeText(text);
  const btn = document.getElementById(btnId);
  const orig = btn.textContent;
  btn.textContent = '✓ COPIADO';
  btn.classList.add('green');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('green'); }, 2000);
}

function render() {
  const offer = offers[selected];
  const content = offer[lang];
  const c = offer.color;

  // Sidebar
  document.getElementById('sidebar').innerHTML = offers.map((o,i) => `
    <button class='sidebar-btn ${i===selected?'active':''}' style='--c:${o.color};background:${i===selected?o.color+'18':'transparent'}' onclick='setSelected(${i})'>
      <div class='sidebar-emoji'>${o.emoji}</div>
      <div class='sidebar-label'>${lang==='es'?o.area:o.areaEN}</div>
    </button>
  `).join('');

  // Header
  const priceStr = lang==='es'?offer.price:offer.priceEN;
  const taglineStr = lang==='es'?offer.tagline:offer.taglineEN;
  const titleStr = lang==='es'?offer.area:offer.areaEN;

  // Tabs
  const tabs = [
    {key:'offer',label:'📋 Oferta'},
    {key:'dm',label:'💬 DM Genérico'},
    {key:'email',label:'📧 Email Genérico'},
    {key:'personal',label:'🎯 Mensajes Personalizados'},
  ];

  let tabContent = '';
  if(tab==='offer') {
    tabContent = `
      <div class='hook-box' style='background:${c}15;border:1px solid ${c}33'>
        <div class='hook-label' style='color:${c}'>GANCHO DE APERTURA</div>
        <div class='hook-text'>${content.hook}</div>
      </div>
      <div class='box'>
        <div class='box-label'>PROPUESTA DE VALOR</div>
        <div class='box-text'>${content.offer}</div>
      </div>
      <div class='box'>
        <div class='box-label'>QUÉ INCLUYE</div>
        ${content.included.map(item=>`
          <div class='check-item'>
            <div class='check-dot' style='background:${c}'>✓</div>
            <div class='check-text'>${item}</div>
          </div>
        `).join('')}
      </div>
      <div class='cta-bar' style='background:${c}'>
        <div class='cta-text'>${content.cta}</div>
        <div class='cta-price'>${priceStr}</div>
      </div>
    `;
  } else if(tab==='dm') {
    tabContent = `
      <div class='box'>
        <div class='box-label'>MENSAJE DIRECTO · INSTAGRAM DM</div>
        <div class='mono'>${content.dm}</div>
      </div>
      <button class='copy-btn' id='cpbtn' style='background:${c}' onclick='copy(\`${content.dm.replace(/`/g,\\\\)}\`,\cpbody\)'>COPIAR CUERPO</button>
      </div>
      <div class='tip'>💡 <strong>Tip:</strong> Envía entre martes y jueves, entre las 9h y las 11h.</div>
    `;
  } else if(tab==='personal') {
    tabContent = `
      <div class='personal-badge' style='background:${c}15;border:1px solid ${c}33'>
        <div class='personal-badge-icon'>🎯</div>
        <div>
          <div class='personal-badge-label' style='color:${c}'>PERFIL DEL DESTINATARIO DE EJEMPLO</div>
          <div class='personal-badge-text'><strong style='color:#fff'>${content.personal.name}</strong> — ${content.personal.context}</div>
        </div>
      </div>
      <div class='section-title'>💬 DM personalizado <span class='section-sub'>— como si lo escribieras tú de verdad</span></div>
      <div class='box' style='border-color:${c}33'>

      <button class='copy-btn' id='cpdm' style='background:${c}' onclick='copy(\`${content.personal.dm.replace(/`/g,\\\\)}\`,\cppbody\)'>COPIAR CUERPO</button>
      </div>
      <div class='tip'>💡 <strong>Cómo usarlo:</strong> Cambia el nombre y adapta el detalle específico de su perfil.</div>
    `;
  }

  document.getElementById('main').innerHTML = `
    <div id='offer-header'>
      <div id='offer-top'>
        <div id='offer-emoji'>${offer.emoji}</div>
        <div>
          <h1 id='offer-title'>${titleStr}</h1>
          <div id='offer-tagline' style='color:${c}'>${taglineStr}</div>
        </div>
        <div id='offer-price-badge' style='background:${c}22;border:1px solid ${c}55;color:${c}'>${priceStr}</div>
      </div>
    </div>
    <div id='tabs'>
      ${tabs.map(t=>`<button class='tab-btn ${tab===t.key?'active':''}' style='${tab===t.key?'background:'+c:'' }' onclick='setTab(\${t.key}\)'>${t.label}</button>`).join('')}
    </div>
    ${tabContent}
  `;
}

render();
</script>
