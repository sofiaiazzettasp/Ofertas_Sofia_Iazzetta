let sel = 0, lang = 'es', tab = 'offer';

function e(s){ 
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function setLang(l){
  lang = l;
  document.getElementById('bes').className = 'lbtn' + (l==='es' ? ' on' : '');
  document.getElementById('ben').className = 'lbtn' + (l==='en' ? ' on' : '');
  render();
}

function setSel(i){ sel = i; tab = 'offer'; render(); }
function setTab(t){ tab = t; render(); }

function cp(text, id){
  navigator.clipboard.writeText(text).catch(function(){
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
  var b = document.getElementById(id);
  var orig = b.textContent;
  b.textContent = '✓ COPIADO';
  b.style.background = '#2e7d32';
  setTimeout(function(){ b.textContent = orig; b.style.background = ''; }, 2000);
}

function renderSidebar(){
  document.getElementById('sidebar').innerHTML = offers.map(function(o, i){
    var on = i === sel;
    return '<button class="sbtn" style="background:' + (on ? o.color+'18' : 'transparent') + ';border-left:3px solid ' + (on ? o.color : 'transparent') + '" onclick="setSel(' + i + ')">'
      + '<div class="em">' + o.emoji + '</div>'
      + '<div class="lbl" style="color:' + (on ? o.color : '#666') + '">' + e(lang==='es' ? o.area : o.areaEN) + '</div>'
      + '</button>';
  }).join('');
}

function renderMain(){
  var o = offers[sel];
  var c = o[lang];
  var col = o.color;
  var price = e(lang==='es' ? o.price : o.priceEN);

  var title = e(lang==='es' ? o.area : o.areaEN);

  var tabDefs = [
    {k:'offer', l:'📋 Oferta'},
    {k:'dm', l:'💬 DM Genérico'},
    {k:'email', l:'📧 Email Genérico'},
    {k:'personal', l:'🎯 Mensajes Personalizados'}
  ];

  var content = '';

  if(tab === 'offer'){
    content = '<div class="hookbox" style="background:'+col+'15;border:1px solid '+col+'33">'
      + '<div class="hlbl" style="color:'+col+'">GANCHO DE APERTURA</div>'
      + '<div class="htext">&ldquo;' + e(c.hook) + '&rdquo;</div></div>'
      + '<div class="box"><div class="blbl">PROPUESTA DE VALOR</div><div class="btext">' + e(c.offer) + '</div></div>'
      + '<div class="box"><div class="blbl">QUÉ INCLUYE</div>'
      + c.included.map(function(item){ return '<div class="chk"><div class="dot" style="background:'+col+'">✓</div><div class="chktxt">'+e(item)+'</div></div>'; }).join('')
      + '</div>'
      + '<div class="ctabar" style="background:'+col+'"><div class="ctatxt">'+e(c.cta)+'</div><div class="ctaprice">'+price+'</div></div>';

  } else if(tab === 'dm'){
    content = '<div class="box"><div class="blbl">DM · INSTAGRAM</div><div class="mono">'+e(c.dm)+'</div></div>'
      + '<button class="cpbtn" id="c1" style="background:'+col+'" onclick="cp(offers['+sel+'][''+lang+''].dm,'c1')">COPIAR MENSAJE</button>'
      + '<div class="tip">💡 <b>Tip:</b> Personaliza [Nombre] y menciona algo concreto de su perfil.</div>';

  } else if(tab === 'email'){
    content = '<div class="box"><div class="blbl">EMAIL DE PROSPECCIÓN</div>'
      + '<div class="sbjbox" style="border-left:3px solid '+col+'"><div class="sbjlbl">ASUNTO</div><div class="sbjtxt">'+e(c.email.subject)+'</div></div>'
      + '<div class="mono">'+e(c.email.body)+'</div></div>'
      + '<div class="brow">'
      + '<button class="cpbtn2" id="c2" style="background:#222;border:1px solid '+col+'44" onclick="cp(offers['+sel+'][''+lang+''].email.subject,'c2')">COPIAR ASUNTO</button>'
      + '<button class="cpbtn2" id="c3" style="background:'+col+';flex:2" onclick="cp(offers['+sel+'][''+lang+''].email.body,'c3')">COPIAR CUERPO</button>'
      + '</div>'
      + '<div class="tip">💡 <b>Tip:</b> Envía entre martes y jueves, entre las 9h y las 11h.</div>';

  } else if(tab === 'personal'){
    var p = c.personal;
    content = '<div class="pbadge" style="background:'+col+'15;border:1px solid '+col+'33">'
      + '<div style="font-size:18px">🎯</div>'
      + '<div><div class="pblbl" style="color:'+col+'">PERFIL DEL DESTINATARIO</div>'
      + '<div class="pbtxt"><b style="color:#fff">'+e(p.name)+'</b> — '+e(p.context)+'</div></div></div>'
      + '<div class="stitle">💬 DM personalizado <span class="ssub">— como si lo escribieras tú</span></div>'
      + '<div class="box" style="border-color:'+col+'33"><div class="mono">'+e(p.dm)+'</div></div>'
      + '<button class="cpbtn" id="c4" style="background:'+col+'" onclick="cp(offers['+sel+'][''+lang+''].personal.dm,'c4')">COPIAR DM PERSONALIZADO</button>'
      + '<div class="divl"></div>'
      + '<div class="stitle">📧 Email personalizado <span class="ssub">— sin sonar a plantilla</span></div>'
      + '<div class="box" style="border-color:'+col+'33">'
      + '<div class="sbjbox" style="border-left:3px solid '+col+'"><div class="sbjlbl">ASUNTO</div><div class="sbjtxt">'+e(p.email.subject)+'</div></div>'
      + '<div class="mono">'+e(p.email.body)+'</div></div>'
      + '<div class="brow">'
      + '<button class="cpbtn2" id="c5" style="background:#222;border:1px solid '+col+'44" onclick="cp(offers['+sel+'][''+lang+''].personal.email.subject,'c5')">COPIAR ASUNTO</button>'
      + '<button class="cpbtn2" id="c6" style="background:'+col+';flex:2" onclick="cp(offers['+sel+'][''+lang+''].personal.email.body,'c6')">COPIAR CUERPO</button>'
      + '</div>'
      + '<div class="tip">💡 <b>Tip:</b> Cambia el nombre y adapta el detalle específico de su perfil.</div>';
  }

  document.getElementById('main').innerHTML =
    '<div class="otop">'
    + '<div class="oemoji">' + o.emoji + '</div>'
    + '<div><h1 class="otitle">' + title + '</h1><div class="otagline" style="color:'+col+'">' + tagline + '</div></div>'
    + '<div class="oprice" style="background:'+col+'22;border:1px solid '+col+'55;color:'+col+'">' + price + '</div>'
    + '</div>'
    + '<div class="tabs">'
    + tabDefs.map(function(t){
        return '<button class="tbtn" style="' + (tab===t.k ? 'background:'+col+';color:#fff' : '') + '" onclick="setTab('' + t.k + '')">' + t.l + '</button>';
      }).join('')
    + '</div>'
    + content;
}

function render(){ renderSidebar(); renderMain(); }
render();
</script>
</body>
</html>
